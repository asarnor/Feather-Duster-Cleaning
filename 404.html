<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f2940">
  <title>Page not found | Feather Duster Cleaning</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <style>
    :root {
      --bg: #f5f0e8;
      --ink: #0f2940;
      --muted: #5d6b77;
      --accent: #d3a14a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(211, 161, 74, 0.18), transparent 30%),
        linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
      text-align: center;
    }
    .wrap { max-width: 36rem; }
    .eyebrow {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    h1 {
      margin: 1rem 0 0;
      font-size: clamp(2.6rem, 8vw, 4.5rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.05rem;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1.5rem;
      padding: 1rem 1.5rem;
      border-radius: 999px;
      background: var(--accent);
      color: #21180a;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
    }
    img { width: 4rem; height: 4rem; object-fit: contain; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/assets/logo.png" alt="Feather Duster Cleaning logo" width="64" height="64">
    <p class="eyebrow">404 &mdash; lost in the dust</p>
    <h1>This page wandered off.</h1>
    <p>We couldn&rsquo;t find what you were looking for. Head back to the home page and let&rsquo;s get you booked.</p>
    <a class="button" href="/">Return home</a>
  </div>
</body>
</html>
